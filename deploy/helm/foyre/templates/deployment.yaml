apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "foyre.fullname" . }}
  labels: {{- include "foyre.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # SQLite-backed deployments must NOT do rolling updates; two replicas
  # holding the same SQLite file open will corrupt it.
  strategy:
    type: Recreate
  selector:
    matchLabels: {{- include "foyre.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll the pod when the app secret changes (e.g. operator rotates JWT).
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "foyre.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "foyre.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: foyre
          image: {{ include "foyre.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: APP_ENV
              value: production
            - name: AUTH_PROVIDER
              value: {{ .Values.auth.provider | quote }}
            - name: JWT_EXPIRES_MINUTES
              value: {{ .Values.auth.jwtExpiresMinutes | quote }}
            - name: STATIC_DIR
              value: /app/static
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  {{- if .Values.database.existingSecret }}
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.existingSecretKey }}
                  {{- else }}
                  name: {{ include "foyre.dbSecretName" . }}
                  key: DATABASE_URL
                  {{- end }}
            - name: APP_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "foyre.appSecretName" . }}
                  key: {{ .Values.secrets.existingSecretKeys.appSecretKey }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "foyre.appSecretName" . }}
                  key: {{ .Values.secrets.existingSecretKeys.jwtSecret }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
          {{- end }}
          livenessProbe: {{- toYaml .Values.probes.liveness | nindent 12 }}
          readinessProbe: {{- toYaml .Values.probes.readiness | nindent 12 }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "foyre.pvcName" . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
