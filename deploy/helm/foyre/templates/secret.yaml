{{/*
App-level Secret holding APP_SECRET_KEY (Fernet) and JWT_SECRET.

Behavior:
  - If `secrets.existingSecret` is set, this template renders nothing —
    we trust the operator to provide both keys.
  - Otherwise we generate strong random values on first install and
    persist them via the helm.sh/resource-policy=keep annotation so
    that helm uninstall does not drop them. (Re-installs with no values
    overrides will reuse the existing values via lookup.)

The Fernet key MUST persist across upgrades because rotating it
silently would render previously-stored kubeconfigs unreadable.
*/}}
{{- if not .Values.secrets.existingSecret -}}
{{- $secretName := include "foyre.appSecretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}

{{- $appKey := "" -}}
{{- if .Values.secrets.appSecretKey -}}
  {{- $appKey = .Values.secrets.appSecretKey -}}
{{- else if and $existing $existing.data (index $existing.data "APP_SECRET_KEY") -}}
  {{- $appKey = index $existing.data "APP_SECRET_KEY" | b64dec -}}
{{- else -}}
  {{/* 32 random bytes, url-safe base64 — Fernet's required format. */}}
  {{- $appKey = randBytes 32 | b64dec | b64enc -}}
{{- end -}}

{{- $jwt := "" -}}
{{- if .Values.secrets.jwtSecret -}}
  {{- $jwt = .Values.secrets.jwtSecret -}}
{{- else if and $existing $existing.data (index $existing.data "JWT_SECRET") -}}
  {{- $jwt = index $existing.data "JWT_SECRET" | b64dec -}}
{{- else -}}
  {{- $jwt = randAlphaNum 48 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels: {{- include "foyre.labels" . | nindent 4 }}
  annotations:
    # Don't drop secrets when the release is uninstalled; rotating them
    # silently would orphan encrypted kubeconfigs.
    "helm.sh/resource-policy": keep
type: Opaque
data:
  APP_SECRET_KEY: {{ $appKey | b64enc | quote }}
  JWT_SECRET: {{ $jwt | b64enc | quote }}
{{- end }}
{{- if .Values.seed.enabled }}
{{- if not .Values.seed.admin.password }}
{{- fail "seed.admin.password must be set when seed.enabled is true" }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "foyre.seedSecretName" . }}
  labels: {{- include "foyre.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  SEED_ADMIN_USERNAME: {{ .Values.seed.admin.username | quote }}
  SEED_ADMIN_PASSWORD: {{ .Values.seed.admin.password | quote }}
  SEED_ADMIN_EMAIL: {{ .Values.seed.admin.email | quote }}
{{- end }}
{{- if and (not .Values.database.existingSecret) .Values.database.url }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "foyre.dbSecretName" . }}
  labels: {{- include "foyre.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.database.url | quote }}
{{- end }}
