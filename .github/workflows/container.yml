# CI/CD: tests → Docker Hub → Helm upgrade on cluster (self-hosted).
#
# Triggers:
#   - push / workflow_dispatch: unit tests + frontend build + helm lint, then
#     build/push image, then Helm deploy (unless FOYRE_AUTO_DEPLOY=false).
#   - pull_request: `ci.yml` runs tests + helm; this workflow runs `build-verify` (Docker build, no push).
#
# Push / dispatch pipeline:
#   1. validate — pytest, compileall, frontend production build, helm lint/template
#   2. publish — build and push multi-arch image to Docker Hub
#   3. deploy-k8s — helm upgrade --install with image tag from (2), service NodePort
#
# Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
# Optional secret: FOYRE_DEPLOY_SEED_PASSWORD (seed admin password)
#
# Repository variables:
#   FOYRE_AUTO_DEPLOY     unset or anything except "false" = run Helm deploy after push
#   FOYRE_RUNNER_LABELS   JSON array for deploy job, default ["self-hosted"]
#   FOYRE_KUBECONFIG_PATH kubeconfig path on runner (default /home/ubuntu/rke2.yaml)
#
# Optional ephemeral smoke (separate): FOYRE_K8S_INTEGRATION=true → helm-e2e job
#
name: Container image

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: container-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Docker Hub image (source code: https://github.com/foyre/foyre).
env:
  IMAGE_NAME: zfeldstein/foyre

jobs:
  # Gate for image build + push: tests and chart sanity (push / dispatch only).
  validate:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    name: Validate (tests + chart)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend production build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Backend install (runtime + dev)
        run: pip install -r backend/requirements-dev.txt

      - name: Unit tests (pytest)
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short

      - name: Byte-compile backend
        run: python -m compileall -q backend/app

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Fetch chart dependencies
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
          helm dependency build deploy/helm/foyre

      - name: Helm lint + template
        run: |
          helm lint deploy/helm/foyre
          helm template foyre-ci deploy/helm/foyre --namespace foyre-ci > /tmp/rendered.yaml

  # PRs: Docker build only (no push, no cluster).
  build-verify:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    needs: [validate]
    # `always()` so this job is evaluated when `validate` is skipped (e.g. PR); then the
    # result check ensures we only publish after a real successful validate on push/dispatch.
    if: >-
      always() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      needs.validate.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image_tag: ${{ steps.sha_tag.outputs.tag }}
    steps:
      - name: Primary image tag for Helm deploy
        id: sha_tag
        run: echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

  deploy-k8s:
    name: Deploy (Helm + NodePort)
    needs: [publish]
    if: >-
      always() &&
      needs.publish.result == 'success' &&
      vars.FOYRE_AUTO_DEPLOY != 'false'
    runs-on: ${{ fromJSON(vars.FOYRE_RUNNER_LABELS != '' && vars.FOYRE_RUNNER_LABELS || '["self-hosted"]') }}
    timeout-minutes: 40
    # Queue deploys for the same ref instead of cancelling mid-rollout.
    concurrency:
      group: deploy-k8s-${{ github.ref }}
      cancel-in-progress: false
    env:
      FOYRE_KUBECONFIG_PATH: ${{ vars.FOYRE_KUBECONFIG_PATH }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve deploy parameters
        id: target
        run: |
          set -euo pipefail
          NS="$(bash scripts/ci/k8s-deploy-namespace.sh "${{ github.ref_name }}" "${{ github.ref_type }}")"
          IMAGE="${{ env.IMAGE_NAME }}"
          TAG="${{ needs.publish.outputs.image_tag }}"
          KCFG="${FOYRE_KUBECONFIG_PATH:-/home/ubuntu/rke2.yaml}"

          {
            echo "namespace=$NS"
            echo "image=$IMAGE"
            echo "tag=$TAG"
            echo "image_full=${IMAGE}:${TAG}"
            echo "kubeconfig=$KCFG"
          } >> "$GITHUB_OUTPUT"

          echo "::group::Deploy parameters"
          echo "Image:      ${IMAGE}:${TAG}"
          echo "Release:    foyre"
          echo "Namespace:  ${NS}"
          echo "Kubeconfig: ${KCFG}"
          echo "Git SHA:    ${{ github.sha }}"
          echo "Ref:        ${{ github.ref }}"
          echo "::endgroup::"

      - name: Configure kubeconfig
        run: |
          set -euo pipefail
          KCFG="${{ steps.target.outputs.kubeconfig }}"
          test -f "$KCFG" || { echo "::error::Kubeconfig not found at $KCFG"; exit 1; }
          echo "KUBECONFIG=$KCFG" >> "$GITHUB_ENV"

      - name: Wait for Docker Hub propagation
        run: sleep 25

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Fetch chart dependencies
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
          helm dependency build deploy/helm/foyre

      - name: Helm upgrade --install (pin SHA, NodePort)
        env:
          DEPLOY_SEED: ${{ secrets.FOYRE_DEPLOY_SEED_PASSWORD }}
        run: |
          set -euxo pipefail
          NS="${{ steps.target.outputs.namespace }}"
          IMAGE="${{ steps.target.outputs.image }}"
          TAG="${{ steps.target.outputs.tag }}"
          PW="${DEPLOY_SEED:-ChangeMeAfterFirstLogin9Zx}"

          echo "Deploying ${IMAGE}:${TAG} to namespace ${NS}"

          helm upgrade --install foyre deploy/helm/foyre \
            --namespace "$NS" \
            --create-namespace \
            --set image.repository="$IMAGE" \
            --set "image.tag=${TAG}" \
            --set service.type=NodePort \
            --set-string "seed.admin.password=${PW}" \
            --atomic \
            --wait --timeout 25m

      - name: Verify rollout + image matches SHA tag
        run: |
          set -euxo pipefail
          NS="${{ steps.target.outputs.namespace }}"
          EXPECTED="${{ steps.target.outputs.image_full }}"

          kubectl rollout status deploy/foyre -n "$NS" --timeout=300s

          ACTUAL="$(kubectl -n "$NS" get deploy foyre -o jsonpath='{.spec.template.spec.containers[?(@.name=="foyre")].image}')"
          echo "Expected image: ${EXPECTED}"
          echo "Running image:  ${ACTUAL}"
          if [ "${ACTUAL}" != "${EXPECTED}" ]; then
            echo "::error::Deployed image ${ACTUAL} does not match expected ${EXPECTED}. Helm --atomic likely rolled back."
            exit 1
          fi

          # Confirm the new code is actually serving traffic.
          kubectl exec -n "$NS" deploy/foyre -- \
            python -c "import urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8000/healthz'); assert r.status == 204"

      - name: Show NodePort (manual validation)
        id: nodeport
        run: |
          set -euxo pipefail
          NS="${{ steps.target.outputs.namespace }}"
          kubectl get svc foyre -n "$NS" -o wide
          NP="$(kubectl get svc foyre -n "$NS" -o jsonpath='{.spec.ports[?(@.name=="http")].nodePort}')"
          NODE_IP="$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')"
          {
            echo "node_port=$NP"
            echo "node_ip=$NODE_IP"
          } >> "$GITHUB_OUTPUT"
          echo "NodePort: $NP"
          echo "Open: http://${NODE_IP}:${NP}/"

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Deployment summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Image | \`${{ steps.target.outputs.image_full }}\` |"
            echo "| Git SHA | \`${{ github.sha }}\` |"
            echo "| Namespace | \`${{ steps.target.outputs.namespace }}\` |"
            echo "| Release | \`foyre\` |"
            if [ -n "${{ steps.nodeport.outputs.node_port }}" ]; then
              echo "| URL | http://${{ steps.nodeport.outputs.node_ip }}:${{ steps.nodeport.outputs.node_port }}/ |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  helm-e2e:
    name: Helm smoke (ephemeral namespace)
    needs: [publish]
    if: >-
      always() &&
      needs.publish.result == 'success' &&
      vars.FOYRE_K8S_INTEGRATION == 'true'
    runs-on: ${{ fromJSON(vars.FOYRE_RUNNER_LABELS != '' && vars.FOYRE_RUNNER_LABELS || '["self-hosted"]') }}
    timeout-minutes: 40
    env:
      CI_NAMESPACE: foyre-ci-${{ github.run_id }}
      CI_RELEASE: foyre-ci-${{ github.run_id }}
      FOYRE_KUBECONFIG_PATH: ${{ vars.FOYRE_KUBECONFIG_PATH }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubeconfig
        run: |
          set -euo pipefail
          KCFG="${FOYRE_KUBECONFIG_PATH:-/home/ubuntu/rke2.yaml}"
          test -f "$KCFG" || { echo "::error::Kubeconfig not found at $KCFG"; exit 1; }
          echo "KUBECONFIG=$KCFG" >> "$GITHUB_ENV"

      - name: Wait for image pull (registry propagation)
        run: sleep 25

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Fetch chart dependencies
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
          helm dependency build deploy/helm/foyre

      - name: Helm install (atomic rollback on failure)
        id: install
        run: |
          set -euxo pipefail
          NS="${{ env.CI_NAMESPACE }}"
          REL="${{ env.CI_RELEASE }}"
          TAG="${{ needs.publish.outputs.image_tag }}"
          helm upgrade --install "$REL" deploy/helm/foyre \
            --namespace "$NS" \
            --create-namespace \
            --set image.repository=${{ env.IMAGE_NAME }} \
            --set "image.tag=${TAG}" \
            --set service.type=NodePort \
            --set seed.admin.password=CiHelmSmokeTemp9Zx \
            --set probes.readiness.initialDelaySeconds=3 \
            --set probes.readiness.periodSeconds=5 \
            --set probes.liveness.initialDelaySeconds=10 \
            --atomic \
            --wait --timeout 25m

      - name: Smoke test (/healthz via pod exec)
        run: |
          set -euxo pipefail
          NS="${{ env.CI_NAMESPACE }}"
          REL="${{ env.CI_RELEASE }}"
          kubectl rollout status "deploy/${REL}" -n "$NS" --timeout=300s
          kubectl exec -n "$NS" "deploy/${REL}" -- \
            python -c "import urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8000/healthz'); assert r.status == 204"

      - name: Teardown (always)
        if: always()
        run: |
          set +e
          NS="${{ env.CI_NAMESPACE }}"
          REL="${{ env.CI_RELEASE }}"
          helm uninstall "$REL" -n "$NS"
          kubectl delete namespace "$NS" --ignore-not-found --wait=true
          exit 0
