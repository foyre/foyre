# Fast checks on every push and pull request. Does not publish images.
name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (TypeScript + Vite build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  backend:
    name: Backend (pytest + compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies (runtime + dev)
        run: pip install -r backend/requirements-dev.txt

      - name: Unit tests
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short

      - name: Byte-compile application package
        run: python -m compileall -q backend/app

  helm:
    name: Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Lint
        run: helm lint deploy/helm/foyre

      - name: Template (syntax / render check)
        run: helm template foyre-ci deploy/helm/foyre --namespace foyre-ci > /tmp/rendered.yaml
